version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: Dockerfile.backend
    ports:
      - '3000:3000'
    env_file: ../apps/backend/.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ..
      dockerfile: Dockerfile.frontend
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: unless-stopped
